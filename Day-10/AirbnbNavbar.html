<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airbnb</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" href="./AirbnbNavbar.css" />
  </head>
  <body>
    <div id="screen">
      <div id="navCnt">
        <div id="topNavCnt">
          <div id="navLogo">
            <img
              class="imgStyle"
              src="https://www.logo.wine/a/logo/Airbnb/Airbnb-Logo.wine.svg"
              alt="Airbnb"
            />
          </div>
          <div id="navNavi">
            <div>
              <span class="material-symbols-outlined"> home </span>
              <h4>Homes</h4>
            </div>
            <div>
              <span class="material-symbols-outlined"> home </span>
              <h4>Experiences</h4>
            </div>
            <div>
              <span class="material-symbols-outlined"> home </span>
              <h4>Services</h4>
            </div>
          </div>
          <div id="navProfile">
            <div class="hoverEffect">Become Host</div>
            <div class="bgCircle">
              <span class="material-symbols-outlined"> home </span>
            </div>
            <div class="bgCircle">
              <span class="material-symbols-outlined"> home </span>
            </div>
          </div>
        </div>
        <div id="botNavCnt">
        <div class="search-bar">
    
    <div class="search-item">
      <div class="label">Where</div>
      <div class="placeholder">Search destinations</div>
    </div>

    <div class="search-item">
      <div class="label">When</div>
      <div class="placeholder">Add dates</div>
    </div>

    <div class="search-item">
      <div class="label">Who</div>
      <div class="placeholder">Add guests</div>
    </div>

    <button class="search-btn">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

  </div>

      <div id="bodyCnt"></div>

    </div>
  </body>
</html>
