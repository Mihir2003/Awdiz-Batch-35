<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Success</title>
    <link rel="stylesheet" href="./success.css" />
    <link rel="stylesheet" href="../Nike/index.css" />
  </head>
  <body>
    <div class="success-container">
      <div class="circle-area">
        <span class="dot dot1"></span>
        <span class="dot dot2"></span>
        <span class="dot dot3"></span>
        <span class="dot dot4"></span>
        <span class="dot dot5"></span>
        <span class="dot dot6"></span>
        <span class="dot dot7"></span>
        <span class="dot dot8"></span>
        <span class="dot dot9"></span>
        <span class="dot dot10"></span>
        <span class="dot dot11"></span>
        <span class="dot dot12"></span>

        <div class="success-icon">✓</div>
      </div>

      <h1>Thank you for ordering!</h1>

      <p>
        Your order has been placed successfully.<br />
        We'll notify you once your package is shipped.
      </p>

      <div class="buttons">
        <a href="#" class="btn view"> View Order </a>

        <a href="../Nike/index.html" class="btn continue"> Continue Shopping </a>
      </div>
    </div>
  </body>
</html>
