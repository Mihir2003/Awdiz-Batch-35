<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .parentCnt {
        border: 2px solid red;
        display: flex;
        height: 200vh;
      }
      .blueCnt {
        background-color: blue;
        height: 250px;
        width: 250px;
      }
      .yellowCnt {
        background-color: yellow;
        height: 250px;
        width: 250px;
        /* position: relative;
        top: 100px;
        left: 200px; */
        /* position: absolute;
        top: 100px;
        left: 140px; */
        position: sticky;
        top: 40px;
        left: 40px;
      }

      button {
        background-color: aqua;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        margin: 50px;
        color: white;
      }
      button:hover {
        background-color: brown;
        color: black;
        padding: 20px 40px;
      }
    </style>
  </head>
  <body>
    <div class="parentCnt">
      <div class="blueCnt">1</div>
      <div class="yellowCnt">2</div>
      <div class="blueCnt">3</div>
    </div>

    <div style="background-color: powderblue">
      <h1>This is text for container</h1>
      <h1>This is text for container</h1>
      <h1>This is text for container</h1>
      <h1>This is text for container</h1>
      <h1>This is text for container</h1>
    </div>

    <div
      style="
        background-image: url(&quot;../images/mens_tshirt.webp&quot;);
        height: 100vh;
        width: 100%;
        background-size: cover;
        background-repeat: no-repeat;
        text-align: center;
        color: white;
      "
    >
      <h1>This is text for container</h1>
      <h1>This is text for container</h1>
      <h1>This is text for container</h1>
      <h1>This is text for container</h1>
      <h1>This is text for container</h1>
    </div>
    <button
      style="
        background: linear-gradient(to right, blue, red);
        width: 240px;
        color: white;
        border: 1px solid white;
      "
    >
      Click me
    </button>

    <div
      style="
        height: 300px;
        width: 300px;
        margin: 50px;
        border-radius: 150px;
      "
    >
      <img
        style="width: 100%; height: 100%; border-radius: 150px"
        src="../images/mens_tshirt.webp"
      />
      <button>Click me</button>
    </div>
  </body>
</html>
