<!doctype html>
<html>
  <head>
    <title>Day 3</title>
  </head>
  <body>
    <h1>Registration Form</h1>
    <form>
      <fieldset>
        <legend>Personal Information</legend>
        <!-- Name Tag -->
        <label for="name">Name :</label> <br />
        <input id="name" type="text" placeholder="Mihir Nighol" /> <br />
        <!-- Email Tag -->
        <label for="email">Email :</label> <br />
        <input id="email" type="email" placeholder="abc@gmail,com" /> <br />
        <!-- Password Tag -->
        <label for="password">Password :</label> <br />
        <input id="password" type="password" placeholder="8 digit Password" /> <br />
        <!-- <input type="radio"/> -->
        <input id="Terms" type="checkbox" /> 
        <label for="Terms">Accept Terms and Conditions</label>
        <br />
        <label>Your Message</label> <br />
        <textarea rows="6" cols="20" placeholder="Type your message"></textarea> <br />
        <input type="submit" value="Register" />
      </fieldset>
    </form>
  </body>
</html>
