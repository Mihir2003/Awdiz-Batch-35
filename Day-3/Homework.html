<!DOCTYPE html>
<html>
    <head>
        <title>Registration Form</title>
    </head>
    <body>
        <h1>Registration Form</h1>
        <fieldset>
            <legend>Personal Information</legend>

            <label>Name:</label> <br />
            <input type="name" placeholder="Mihir Nighol"/> <br />

            <label>Email:</label> <br />
            <input type="email" placeholder="abc@gmail.com"/> <br />

            <label>Password:</label> <br />
            <input type="password" value="password" placeholder="Enter your password"/> <br />

            <input type="radio"/> <label>Male</label>
            <input type="radio"/> <label>Female</label> <br />

            <label>Skills</label> <br />
            <input type="checkbox"/> <label>HTML</label>
            <input type="checkbox"/> <label>CSS</label>
            <input type="checkbox"/> <label>JavaScript</label> <br />

            <label>Bio</label> <br />
            <textarea rows="6" cols="30"></textarea> <br />

            <input type="submit" />

        </fieldset>    

    </body>
</html>
